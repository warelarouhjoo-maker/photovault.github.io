<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PhotoVault — Galerie</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,600;1,300;1,600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0b0f;--s1:#111318;--s2:#181a22;--s3:#21232e;--s4:#2a2d3a;--b1:rgba(255,255,255,.06);--b2:rgba(255,255,255,.11);--accent:#3ecfbf;--gold:#f5c542;--red:#ef6c6c;--blue:#6c9fff;--text:#dde0ee;--t2:#9098b4;--t3:#555c75;--r:14px;--sb:260px;--top:56px}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}html{font-size:16px}body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
#topbar{position:fixed;top:0;left:0;right:0;height:var(--top);z-index:100;background:rgba(10,11,15,.93);backdrop-filter:blur(16px);border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:10px;padding:0 16px}
.tb-ham{display:none;background:none;border:none;color:var(--text);font-size:1.15rem;cursor:pointer;padding:7px;border-radius:8px;transition:background .15s;flex-shrink:0}.tb-ham:hover{background:var(--b1)}
.tb-logo{font-family:'Fraunces',serif;font-size:1.1rem;font-style:italic;font-weight:600;flex-shrink:0}.tb-logo em{color:var(--accent);font-style:normal}
.tb-search{flex:1;max-width:340px;display:flex;align-items:center;gap:7px;background:var(--s2);border:1px solid var(--b1);border-radius:9px;padding:7px 12px;transition:border-color .15s}
.tb-search:focus-within{border-color:rgba(62,207,191,.28)}.tb-search input{background:none;border:none;outline:none;color:var(--text);font-family:'Outfit',sans-serif;font-size:.84rem;width:100%}.tb-search input::placeholder{color:var(--t3)}
.tb-right{display:flex;align-items:center;gap:8px;margin-left:auto}
.pub-badge{font-size:.65rem;padding:3px 9px;border-radius:20px;font-weight:600;letter-spacing:.3px;background:rgba(62,207,191,.1);color:var(--accent);border:1px solid rgba(62,207,191,.18);flex-shrink:0}
.admin-link-btn{padding:5px 12px;border-radius:8px;border:1px solid rgba(245,197,66,.18);background:rgba(245,197,66,.06);color:var(--gold);font-size:.72rem;font-family:'Outfit',sans-serif;cursor:pointer;transition:all .15s;text-decoration:none;flex-shrink:0}
.admin-link-btn:hover{background:rgba(245,197,66,.12)}
#pub-banner{position:fixed;top:var(--top);left:0;right:0;z-index:90;background:linear-gradient(90deg,rgba(62,207,191,.07),rgba(62,207,191,.02));border-bottom:1px solid rgba(62,207,191,.1);padding:5px 20px 5px calc(var(--sb) + 20px);font-size:.74rem;color:var(--accent);display:flex;align-items:center;gap:8px}
.pb-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:abp 2.5s ease-in-out infinite}@keyframes abp{0%,100%{opacity:1}50%{opacity:.3}}
#sb-ov{display:none;position:fixed;inset:0;z-index:89;background:rgba(0,0,0,.55);backdrop-filter:blur(2px)}#sb-ov.show{display:block}
#sidebar{position:fixed;left:0;top:var(--top);bottom:0;width:var(--sb);z-index:95;background:var(--s1);border-right:1px solid var(--b1);display:flex;flex-direction:column;overflow:hidden;transition:transform .3s cubic-bezier(.4,0,.2,1)}
.sb-stats{display:flex;border-bottom:1px solid var(--b1);flex-shrink:0}
.sbs{flex:1;padding:10px 0;text-align:center;border-right:1px solid var(--b1)}.sbs:last-child{border-right:none}
.sbs .n{font-family:'Fraunces',serif;font-size:1.05rem;color:var(--accent);display:block}.sbs .l{font-size:.55rem;text-transform:uppercase;letter-spacing:.8px;color:var(--t3);margin-top:1px}
.sb-lbl{padding:9px 16px 3px;font-size:.6rem;text-transform:uppercase;letter-spacing:1px;color:var(--t3);font-weight:600;flex-shrink:0}
#album-list{flex:1;overflow-y:auto;padding:3px 6px 6px}#album-list::-webkit-scrollbar{width:3px}#album-list::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
.al{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:10px;cursor:pointer;transition:background .15s;margin-bottom:2px;position:relative}
.al:hover{background:var(--s2)}.al.active{background:rgba(62,207,191,.07)}.al.active::before{content:'';position:absolute;left:0;top:22%;bottom:22%;width:2.5px;border-radius:0 2px 2px 0;background:var(--accent)}
.al-img{width:30px;height:30px;border-radius:7px;background:var(--s3);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:.85rem}
.al-img img{width:100%;height:100%;object-fit:cover}.al-inf{flex:1;min-width:0}.al-nm{font-size:.8rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.al-ct{font-size:.63rem;color:var(--t3);margin-top:1px}
.sb-foot{padding:10px 8px 14px;border-top:1px solid var(--b1);flex-shrink:0}
.alink{display:flex;align-items:center;justify-content:center;gap:7px;padding:9px 12px;border-radius:9px;border:1px solid rgba(245,197,66,.18);background:rgba(245,197,66,.05);color:var(--gold);font-size:.8rem;cursor:pointer;transition:all .15s;text-decoration:none}
.alink:hover{background:rgba(245,197,66,.1);border-color:rgba(245,197,66,.3)}
#cwrap{padding-top:calc(var(--top) + 30px);margin-left:var(--sb);min-height:100vh;display:flex;flex-direction:column}
#controls{position:sticky;top:calc(var(--top) + 30px);z-index:70;background:rgba(10,11,15,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--b1);padding:10px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
#controls h2{font-family:'Fraunces',serif;font-style:italic;font-size:1.05rem;font-weight:300;flex:1;min-width:100px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-sort{background:var(--s2);border:1px solid var(--b1);color:var(--text);border-radius:9px;padding:6px 10px;font-family:'Outfit',sans-serif;font-size:.78rem;cursor:pointer}
.vbtns{display:flex;gap:3px}.vbtn{background:none;border:1px solid var(--b1);color:var(--t3);width:30px;height:30px;border-radius:7px;cursor:pointer;font-size:.85rem;transition:all .15s}.vbtn.on,.vbtn:hover{background:var(--s2);border-color:var(--b2);color:var(--text)}
#gwrap{padding:14px 20px 40px;flex:1}
#grid{display:grid;gap:12px;grid-template-columns:repeat(auto-fill,minmax(min(180px,100%),1fr))}#grid.list{grid-template-columns:1fr}
.pc{background:var(--s2);border-radius:var(--r);overflow:hidden;cursor:pointer;border:1px solid var(--b1);transition:transform .2s,box-shadow .2s;animation:pcin .3s ease both;position:relative}
.pc:hover{transform:translateY(-3px);box-shadow:0 14px 36px rgba(0,0,0,.5);border-color:var(--b2)}
@keyframes pcin{from{opacity:0;transform:scale(.95) translateY(8px)}to{opacity:1;transform:none}}
.pc-iw{position:relative;overflow:hidden}
.pc img.th{width:100%;aspect-ratio:1;object-fit:cover;display:block;transition:transform .3s;background:var(--s3)}.pc:hover img.th{transform:scale(1.06)}
.pc-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.85) 0%,transparent 55%);opacity:0;transition:opacity .2s;display:flex;flex-direction:column;justify-content:flex-end;padding:11px}
.pc:hover .pc-ov{opacity:1}
.pc-t{font-size:.78rem;font-weight:500;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pc-m{font-size:.63rem;color:rgba(255,255,255,.4);margin-top:2px}
.pc-dl{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.55);border-radius:8px;padding:4px 8px;color:rgba(255,255,255,.6);font-size:.65rem;cursor:pointer;border:1px solid var(--b2);text-decoration:none;opacity:0;transition:opacity .2s}
.pc:hover .pc-dl{opacity:1}.pc-dl:hover{color:#fff;background:rgba(0,0,0,.75)}
#grid.list .pc{display:flex;align-items:center;gap:12px;padding:9px}
#grid.list .pc-iw{width:50px;height:50px;flex-shrink:0;border-radius:8px}
#grid.list .pc img.th{aspect-ratio:1;width:100%;height:100%}
#grid.list .pc-ov{position:static;opacity:1;background:none;padding:0;flex:1}
#grid.list .pc-t{color:var(--text)}#grid.list .pc:hover{transform:none}#grid.list .pc:hover img.th{transform:none}
#grid.list .pc-dl{display:none}
#empty{display:none;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:10px}#empty.show{display:flex}#empty .ei{font-size:3rem;opacity:.1}#empty p{color:var(--t3);font-size:.88rem}

/* LIGHTBOX */
#lb{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.97);display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px}
#lb.open{display:flex;animation:lbin .18s ease}@keyframes lbin{from{opacity:0}to{opacity:1}}
#lb-img{max-width:min(90vw,860px);max-height:65vh;object-fit:contain;border-radius:10px;transition:opacity .12s}
.lba{position:fixed;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:50%;width:44px;height:44px;color:#fff;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
.lba:hover{background:rgba(255,255,255,.15)}
#lbp{left:clamp(4px,2vw,20px)}#lbn{right:clamp(4px,2vw,20px)}
#lbx{position:fixed;top:14px;right:14px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:50%;width:38px;height:38px;color:#fff;font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
#lbx:hover{background:rgba(255,255,255,.15)}
#lbc{position:fixed;top:14px;left:50%;transform:translateX(-50%);font-size:.7rem;color:rgba(255,255,255,.3);background:rgba(0,0,0,.6);padding:3px 14px;border-radius:20px}
#lb-bottom{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(to top,rgba(0,0,0,.95),transparent);padding:16px 20px 20px;display:flex;flex-direction:column;gap:10px}
#lb-info-row{display:flex;align-items:flex-start;gap:12px}
#lb-name{font-family:'Fraunces',serif;font-size:.95rem;color:#fff;flex:1}
#lb-meta{font-size:.7rem;color:rgba(255,255,255,.35);margin-top:2px}
.lb-dl{padding:5px 14px;border-radius:8px;background:rgba(62,207,191,.18);border:1px solid rgba(62,207,191,.3);color:var(--accent);font-size:.74rem;text-decoration:none;display:flex;align-items:center;gap:5px;flex-shrink:0}
.lb-dl:hover{background:rgba(62,207,191,.3)}

/* Commentaires publics */
#comments-wrap{background:var(--s1);border-top:1px solid var(--b1);padding:10px 16px;max-height:180px;overflow-y:auto;display:flex;flex-direction:column;gap:7px}
#comments-wrap::-webkit-scrollbar{width:3px}#comments-wrap::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
.comment{display:flex;gap:8px;align-items:flex-start}
.cm-av{width:22px;height:22px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:700;color:#0a0a0a}
.cm-body{flex:1;min-width:0}
.cm-user{font-size:.72rem;font-weight:600;color:var(--t2)}
.cm-time{font-size:.6rem;color:var(--t3);margin-left:6px}
.cm-text{font-size:.82rem;color:var(--text);line-height:1.4;word-break:break-word;margin-top:2px}
.no-cm{font-size:.78rem;color:var(--t3);text-align:center;padding:6px 0}
.pub-note{font-size:.74rem;color:var(--t3);text-align:center;padding:4px;font-style:italic}

#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(12px);z-index:700;background:var(--s1);border:1px solid var(--b2);border-radius:12px;padding:10px 18px;font-size:.86rem;pointer-events:none;opacity:0;transition:all .25s;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}#toast.ok{border-left:3px solid var(--accent)}

::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--s4);border-radius:2px}
.sb-mob-search{display:none;padding:8px 8px 0}
.sb-mob-search input{width:100%;padding:8px 12px;border-radius:9px;background:var(--s3);border:1px solid var(--b2);color:var(--text);font-family:'Outfit',sans-serif;font-size:.85rem;outline:none}

@media(max-width:900px){:root{--sb:220px}}
@media(max-width:640px){
  :root{--sb:270px}
  .tb-ham{display:flex;align-items:center;justify-content:center}
  .tb-search{display:none}.pub-badge{display:none}
  #sidebar{transform:translateX(-100%)}#sidebar.open{transform:translateX(0);box-shadow:4px 0 40px rgba(0,0,0,.6)}
  #pub-banner{padding-left:16px;padding-right:16px}
  #cwrap{margin-left:0}
  #controls{padding:8px 12px;gap:8px}#gwrap{padding:10px 12px 40px}
  #grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:9px}
  .sb-mob-search{display:block}.lba{width:36px;height:36px;font-size:.9rem}
  #lb-bottom{padding:10px 14px 14px}
}
@media(max-width:380px){#grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:1400px){:root{--sb:280px}#grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}}
</style>
</head>
<body>

<header id="topbar">
  <button class="tb-ham" onclick="toggleSB()">☰</button>
  <div class="tb-logo">Photo<em>Vault</em></div>
  <div class="tb-search"><span style="color:var(--t3);font-size:.8rem">🔍</span><input id="sch" type="text" placeholder="Rechercher…" oninput="dsch()"></div>
  <div class="tb-right">
    <div class="pub-badge">Galerie publique</div>
    <a class="admin-link-btn" id="abtn" href="#" target="_blank">🔐 Connexion</a>
  </div>
</header>

<div id="pub-banner">
  <div class="pb-dot"></div>
  <span>Galerie publique — lecture seule</span>
  <a id="abanner" href="#" style="color:var(--gold);margin-left:auto;font-size:.7rem" target="_blank">→ Espace membres</a>
</div>

<div id="sb-ov" onclick="closeSB()"></div>

<nav id="sidebar">
  <div class="sb-mob-search"><input id="schm" type="text" placeholder="🔍 Rechercher…" oninput="dschm()"></div>
  <div class="sb-stats">
    <div class="sbs"><span class="n" id="sph">–</span><span class="l">Photos</span></div>
    <div class="sbs"><span class="n" id="sal">–</span><span class="l">Albums</span></div>
    <div class="sbs"><span class="n" id="sus">–</span><span class="l">Membres</span></div>
  </div>
  <div class="sb-lbl">Albums</div>
  <div id="album-list"></div>
  <div class="sb-foot"><a class="alink" id="alink" href="#" target="_blank">🔐 Espace membres</a></div>
</nav>

<div id="cwrap">
  <div id="controls">
    <h2 id="atitle">Ma galerie</h2>
    <select class="c-sort" id="sort" onchange="loadPhotos()">
      <option value="created_at">Date ↓</option>
      <option value="created_at_asc">Date ↑</option>
      <option value="title">Nom</option>
      <option value="size">Taille</option>
    </select>
    <div class="vbtns">
      <button class="vbtn on" id="vg" onclick="setView('grid')">⊞</button>
      <button class="vbtn" id="vl" onclick="setView('list')">☰</button>
    </div>
  </div>
  <div id="gwrap"><div id="grid"></div><div id="empty"><div class="ei">🖼</div><p>Aucune photo ici</p></div></div>
</div>

<!-- LIGHTBOX -->
<div id="lb">
  <button id="lbx" onclick="lbClose()">✕</button>
  <div id="lbc"></div>
  <img id="lb-img" src="" alt="">
  <button class="lba" id="lbp" onclick="lbNav(-1)">‹</button>
  <button class="lba" id="lbn" onclick="lbNav(1)">›</button>
  <div id="lb-bottom">
    <div id="lb-info-row">
      <div><div id="lb-name"></div><div id="lb-meta"></div></div>
      <a class="lb-dl" id="lb-dl" href="#" download>⬇ Télécharger</a>
    </div>
    <div id="comments-wrap">
      <div class="no-cm" id="no-cm">Aucun commentaire</div>
    </div>
    <div class="pub-note">Connecte-toi pour commenter → <a id="acomment" href="#" target="_blank" style="color:var(--gold)">Espace membres</a></div>
  </div>
</div>

<div id="toast"></div>

<script>
const API=window.location.origin;
const ADMIN_URL=window.location.protocol+'//'+window.location.hostname+':3000';
let albums=[],photos=[],lbIdx=0,curAlbum=null,schT;
const COLORS=['#f5c542','#3ecfbf','#6c9fff','#ef6c6c','#b06cff','#f09d3e'];
function userColor(n){return COLORS[(n||'').split('').reduce((a,c)=>a+c.charCodeAt(0),0)%COLORS.length];}

window.addEventListener('DOMContentLoaded',()=>{
  [document.getElementById('abtn'),document.getElementById('abanner'),document.getElementById('alink'),document.getElementById('acomment')].forEach(el=>{if(el)el.href=ADMIN_URL;});
  loadAll();
});

function toggleSB(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('sb-ov').classList.toggle('show');}
function closeSB(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sb-ov').classList.remove('show');}

async function loadAll(){await loadAlbums();await loadPhotos();await loadStats();}

async function loadAlbums(){albums=await api('/api/albums');renderAlbums();}
function renderAlbums(){
  const list=document.getElementById('album-list');list.innerHTML='';
  list.appendChild(mkAl(null,'🌐 Toutes',photos.length));
  albums.forEach(a=>list.appendChild(mkAl(a.id,a.name,a.photo_count||0,a.cover_filename)));
}
function mkAl(id,name,count,cover){
  const d=document.createElement('div');d.className='al'+(curAlbum===id?' active':'');
  d.onclick=()=>{selAlbum(id,name);closeSB();};
  const th=cover?`<div class="al-img"><img src="${API}/photos/${cover}" loading="lazy"></div>`:`<div class="al-img">${id===null?'🌐':'📁'}</div>`;
  d.innerHTML=`${th}<div class="al-inf"><div class="al-nm">${name}</div><div class="al-ct">${count} photo${count!==1?'s':''}</div></div>`;
  return d;
}
function selAlbum(id,name){curAlbum=id;document.getElementById('atitle').textContent=name||'Ma galerie';document.getElementById('sch').value='';document.getElementById('schm').value='';renderAlbums();loadPhotos();}

async function loadPhotos(){
  const sv=document.getElementById('sort').value;
  const [sort,order]=sv==='created_at_asc'?['created_at','ASC']:[sv,'DESC'];
  const search=document.getElementById('sch').value||document.getElementById('schm').value;
  const p=new URLSearchParams({sort,order});
  if(curAlbum)p.set('album_id',curAlbum);if(search)p.set('search',search);
  photos=await api(`/api/photos?${p}`);renderGrid();renderAlbums();
}
function renderGrid(){
  const g=document.getElementById('grid'),em=document.getElementById('empty');g.innerHTML='';
  if(!photos.length){g.style.display='none';em.classList.add('show');return;}
  em.classList.remove('show');g.style.display='grid';
  photos.forEach((p,i)=>{
    const c=document.createElement('div');c.className='pc';c.style.animationDelay=Math.min(i*14,400)+'ms';
    const t=p.title||p.original;
    c.innerHTML=`<div class="pc-iw" onclick="openLb(${i})">
      <img class="th" src="${API}/photos/${p.filename}" alt="${t}" loading="lazy">
      <a class="pc-dl" href="${API}/photos/${p.filename}" download="${p.original}" onclick="event.stopPropagation()">⬇</a>
      <div class="pc-ov"><div class="pc-t">${t}</div><div class="pc-m">${fmtSz(p.size)} · par ${p.owner_name||'?'}</div></div>
    </div>`;
    g.appendChild(c);
  });
}
async function loadStats(){const s=await api('/api/stats');document.getElementById('sph').textContent=s.photos??'–';document.getElementById('sal').textContent=s.albums??'–';document.getElementById('sus').textContent=s.users??'–';}

let currentPhotoId=null;
function openLb(i){lbIdx=i;showLb();document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');currentPhotoId=null;}
function showLb(){
  const p=photos[lbIdx];currentPhotoId=p.id;
  const img=document.getElementById('lb-img');img.style.opacity='.1';img.src=API+'/photos/'+p.filename;img.onload=()=>img.style.opacity='1';
  document.getElementById('lb-name').innerHTML=`<span style="font-family:'Fraunces',serif;color:#fff">${p.title||p.original}</span>`;
  document.getElementById('lb-meta').textContent=`par ${p.owner_name||'?'} · ${(p.created_at||'').slice(0,10)} · ${fmtSz(p.size)}`;
  document.getElementById('lb-dl').href=API+'/photos/'+p.filename;document.getElementById('lb-dl').download=p.original;
  document.getElementById('lbc').textContent=`${lbIdx+1} / ${photos.length}`;
  loadComments(p.id);
}
function lbNav(d){lbIdx=(lbIdx+d+photos.length)%photos.length;showLb();}
document.getElementById('lb').addEventListener('click',e=>{if(e.target.id==='lb')lbClose();});
document.addEventListener('keydown',e=>{if(!document.getElementById('lb').classList.contains('open'))return;if(e.key==='ArrowRight')lbNav(1);if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='Escape')lbClose();});
let tx=0;document.getElementById('lb').addEventListener('touchstart',e=>tx=e.touches[0].clientX,{passive:true});
document.getElementById('lb').addEventListener('touchend',e=>{const d=e.changedTouches[0].clientX-tx;if(Math.abs(d)>50)lbNav(d<0?1:-1);});

async function loadComments(photoId){
  const wrap=document.getElementById('comments-wrap');
  wrap.querySelectorAll('.comment').forEach(c=>c.remove());
  document.getElementById('no-cm').style.display='block';
  const cms=await api(`/api/photos/${photoId}/comments`);
  if(cms.length){
    document.getElementById('no-cm').style.display='none';
    cms.forEach(c=>{
      const div=document.createElement('div');div.className='comment';
      const col=userColor(c.username);
      div.innerHTML=`<div class="cm-av" style="background:${col};color:#0a0a0a">${c.username[0].toUpperCase()}</div>
        <div class="cm-body"><div><span class="cm-user">${c.username}</span><span class="cm-time">${new Date(c.created_at).toLocaleDateString('fr')}</span></div>
        <div class="cm-text">${c.content.replace(/</g,'&lt;')}</div></div>`;
      wrap.insertBefore(div,document.getElementById('no-cm'));
    });
  }
  wrap.scrollTop=wrap.scrollHeight;
}

function setView(m){document.getElementById('grid').className=m==='list'?'list':'';document.getElementById('vg').classList.toggle('on',m==='grid');document.getElementById('vl').classList.toggle('on',m==='list');}

async function api(path){try{const r=await fetch(API+path);return r.json();}catch{return [];}}
function fmtSz(b){if(!b)return '';if(b<1024)return b+' o';if(b<1048576)return (b/1024).toFixed(0)+' Ko';return (b/1048576).toFixed(1)+' Mo';}
